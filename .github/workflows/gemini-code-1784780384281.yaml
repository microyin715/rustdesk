name: Build Custom Client

on:
  workflow_dispatch: # 允许在 GitHub 界面手动触发点击编译

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装 Rust 环境
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 环境变量注入你的自建服务器
      - name: Set Custom Server Environments
        run: |
          echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $env:GITHUB_ENV
          echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $env:GITHUB_ENV

      # 安装 Flutter 依赖
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 构建 Flutter Rust Bridge
      - name: Build Flutter Bridge & Rust
        run: |
          cargo install flutter_rust_bridge_codegen
          cd flutter
          flutter pub get
          cd ..

      # 执行编译打包
      - name: Build Windows Executable
        run: |
          cargo build --release --features flutter

      # 导出编译好的 EXE 文件
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Windows
          path: target/release/rustdesk.exe