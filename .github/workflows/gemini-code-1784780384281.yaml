name: Build Custom Client

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      # 1. 递归拉取代码和所有 Git 子模块
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装 LLVM/Clang (RustDesk 绑定代码依赖 libclang)
      - name: Install LLVM
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      # 3. 配置 Rust 环境
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 4. 注入你的自建服务器配置
      - name: Set Custom Server Environments
        run: |
          echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $env:GITHUB_ENV
          echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $env:GITHUB_ENV

      # 5. 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 6. 利用 GitHub 缓存优化 vcpkg 编译速度
      - name: Setup vcpkg
        run: |
          $env:VCPKG_ROOT = "$env:RUNNER_WORKSPACE\vcpkg"
          if (!(Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          }
          & "$env:VCPKG_ROOT\vcpkg.exe" install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
          echo "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV

      # 7. 获取 Flutter 依赖并生成代码
      - name: Prepare Flutter and Bridge
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen --rust-input ..\src\flutter_ffi.rs --dart-output .\lib\generated_bridge.dart
          cd ..

      # 8. 执行最终编译打包
      - name: Build Windows Executable
        run: |
          cargo build --release --features flutter

      # 9. 导出产物
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Windows
          path: target/release/rustdesk.exe
